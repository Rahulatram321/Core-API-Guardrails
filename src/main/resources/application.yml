spring:
  application:
    name: core-api-guardrails
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/arogyadoot
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

logging:
  level:
    root: INFO
    com.coreapi.guardrails: DEBUG
